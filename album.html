<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空间相册 · YWLL</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23e06c75'/%3E%3Ctext x='50' y='70' text-anchor='middle' fill='%23fff' font-family='Georgia,serif' font-size='56' font-weight='700'%3EW%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="logo">
      <svg viewBox="0 0 76 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:24px;width:auto;">
        <text x="0" y="18" font-family="'Noto Serif SC',Georgia,serif" font-size="16" font-weight="600" fill="#8a6a5c">Y</text>
        <text x="13" y="18" font-family="'Noto Serif SC',Georgia,serif" font-size="18" font-weight="700" fill="#e06c75">W</text>
        <text x="32" y="18" font-family="'Noto Serif SC',Georgia,serif" font-size="16" font-weight="600" fill="#8a6a5c">LL</text>
      </svg>
      <span class="logo-text">爱情纪念</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="album.html" class="active">空间相册</a></li>
      <li><a href="blog.html">爱的日记</a></li>
      <li><a href="admin.html">管理员</a></li>
    </ul>
  </div>
</nav>

<main class="container fade-in">
  <div class="card">
    <h2 class="section-title">📸 空间相册</h2>
    <p class="section-subtitle">每一张照片，都是时光写给我们的情书</p>

    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <div style="font-size:36px; margin-bottom:8px;">📷</div>
      <div style="font-size:15px; color:var(--text);">点击或拖拽上传照片</div>
      <div style="font-size:12px; margin-top:6px; color:var(--text-light);">支持 JPG / PNG，单张建议不超过 5MB</div>
      <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)">
    </div>

    <div style="margin-top:14px; display:none; gap:8px; flex-wrap:wrap;" id="upload-preview"></div>
    <div style="text-align:right; margin-top:10px; display:none;" id="upload-actions">
      <button class="btn btn-secondary btn-sm" onclick="clearUpload()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="confirmUpload()" style="margin-left:8px;">确认上传</button>
    </div>

    <div class="album-grid" id="album-grid" style="margin-top:28px;"></div>
  </div>
</main>

<footer class="footer">
  <p>💕 YWLL · 我们的爱情纪念站 · 始于心动，终于白首</p>
</footer>

<div class="lightbox" id="lightbox" onclick="YWLL.closeLightbox()">
  <button class="lightbox-close">&times;</button>
  <img id="lightbox-img" src="" alt="preview">
</div>

<script src="app.js"></script>
<script>
(function(){
  YWLL.initDemoData();
  let pending = [];

  function render() {
    const grid = document.getElementById('album-grid');
    const data = YWLL.getAlbum();
    if (!data.length) { grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-light);padding:30px 0;">相册为空，快去上传第一张爱的见证吧~</p>'; return; }
    grid.innerHTML = data.map(item => `
      <div class="album-item" onclick="YWLL.openLightbox('${item.src}')">
        <img src="${item.src}" alt="${escapeHtml(item.title)}">
        <div class="album-title">${escapeHtml(item.title)}</div>
      </div>
    `).join('');
  }

  function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

  async function handleFiles(files) {
    pending = [];
    const preview = document.getElementById('upload-preview');
    const actions = document.getElementById('upload-actions');
    preview.innerHTML = '';
    for (const file of files) {
      if (!file.type.startsWith('image/')) continue;
      try {
        const dataUrl = await YWLL.compressImage(file, 1200, 1200, 0.75);
        pending.push({ dataUrl, title: file.name.replace(/\.[^.]+$/, '') });
        const img = document.createElement('img');
        img.src = dataUrl;
        img.style.cssText = 'width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--rose-light);';
        preview.appendChild(img);
      } catch (e) { console.error(e); }
    }
    if (pending.length) {
      preview.style.display = 'flex';
      actions.style.display = 'block';
    }
  }
  window.handleFiles = handleFiles;

  window.clearUpload = function() {
    pending = [];
    document.getElementById('upload-preview').innerHTML = '';
    document.getElementById('upload-preview').style.display = 'none';
    document.getElementById('upload-actions').style.display = 'none';
    document.getElementById('file-input').value = '';
  };

  window.confirmUpload = function() {
    pending.forEach(p => YWLL.addAlbum({ title: p.title, desc: '', src: p.dataUrl }));
    YWLL.toast(`成功上传 ${pending.length} 张照片 💕`);
    clearUpload();
    render();
  };

  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = 'var(--rose)'; });
  zone.addEventListener('dragleave', e => { e.preventDefault(); zone.style.borderColor = 'var(--rose-light)'; });
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.style.borderColor = 'var(--rose-light)';
    handleFiles(e.dataTransfer.files);
  });

  render();
})();
</script>
</body>
</html>
